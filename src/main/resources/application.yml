server:
  port: 8080 # Cổng chạy API Backend của bạn

spring:
  application:
    name: mes-backend

  # CẤU HÌNH KẾT NỐI DATABASE POSTGRESQL (Khớp với Docker)
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_mes_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10 # Tối ưu hóa số lượng kết nối đồng thời

  # CẤU HÌNH JPA / HIBERNATE (Trình quản lý CSDL của Java)
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # CỰC KỲ QUAN TRỌNG: "update" giúp Spring Boot tự động tạo bảng
      # dựa trên các class Entity (như BaseEntity) mà bạn viết trong code.
      ddl-auto: update 
    show-sql: true # Hiển thị câu lệnh SQL trên màn hình Console để dễ Debug
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

# Tắt bớt các log không cần thiết để màn hình Console gọn gàng hơn
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE