server:
  port: ${SERVER_PORT:8080} # Cổng chạy API Backend của bạn

spring:
  application:
    name: mes-backend

  # CẤU HÌNH KẾT NỐI DATABASE POSTGRESQL (Khớp với Docker)
  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST}:${POSTGRESQL_PORT}/${POSTGRESQL_DATABASE}
    username: ${POSTGRESQL_USERNAME}
    password: ${POSTGRESQL_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10 # Tối ưu hóa số lượng kết nối đồng thời

  # CẤU HÌNH JPA / HIBERNATE (Trình quản lý CSDL của Java)
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Dev có thể dùng update; production nên dùng validate và migration tool.
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: true # Hiển thị câu lệnh SQL trên màn hình Console để dễ Debug
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: ${FLYWAY_ENABLED:false}

# Tắt bớt các log không cần thiết để màn hình Console gọn gàng hơn
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  jwt:
    secret: ${JWT_SECRET}
  cookie:
    secure: ${COOKIE_SECURE:false}
  domain: ${DOMAIN}
